<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Shagar Chandro | Portfolio</title>

    <link rel="stylesheet" href="style.css">

    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="#" class="logo">Portfolio.</a>

    <!-- MENU ICON -->
    <div class="menu-toggle" id="menu-toggle">
        <i class='bx bx-menu'></i>
    </div>

    <ul class="nav-links" id="nav-links">
        <li class="active"><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#skills">Skills</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
</nav>

<!-- BACKGROUND ANIMATION -->
<div class="bars-animation">
    <div class="bar" style="--i:6"></div>
    <div class="bar" style="--i:5"></div>
    <div class="bar" style="--i:4"></div>
    <div class="bar" style="--i:3"></div>
    <div class="bar" style="--i:2"></div>
    <div class="bar" style="--i:1"></div>
</div>

<!-- HOME -->
<section class="home" id="home">
    <div class="home-info">
        <h1>Shagar Chandro</h1>

        <h2>
            I'm a 
            <span style="--i:4" data-text="Frontend Developer">Frontend Developer</span>
            <span style="--i:3" data-text="UI/UX Designer">UI/UX Designer</span>
            <span style="--i:2" data-text="Web Designer">Web Designer</span>
            <span style="--i:1" data-text="Content Creator">Content Creator</span>
        </h2>

        <p>
            I am a Frontend Developer, creating modern, responsive,
            and user-friendly websites using the latest web technologies.
        </p>

        <div class="btn-sci">
            <a href="#contact" class="btn">Hire me</a>

            <div class="sci">
                <a href="#"><i class='bx bxl-facebook'></i></a>
                <a href="#"><i class='bx bxl-twitter'></i></a>
                <a href="#"><i class='bx bxl-github'></i></a>
                <a href="#"><i class='bx bxl-linkedin'></i></a>
            </div>
        </div>
    </div>

    <div class="home-img">
        <div class="img-box">
            <div class="img-item">
                <img src="images/home.png" alt="Profile Picture">
            </div>
        </div>
    </div>
</section>

<!-- JS -->
<script>
const menuToggle = document.getElementById("menu-toggle");
const navLinks = document.getElementById("nav-links");

menuToggle.addEventListener("click", () => {
    navLinks.classList.toggle("active");
});
</script>

</body>
</html>
